# ============================================================
#  SmartNest — Azure Pipelines CI/CD
#
#  Pipeline stages:
#    1. Validate   — preflight var check + bicep build + az deployment validate
#    2. WhatIf     — az deployment what-if (informational, never modifies)
#    3. DeployDev  — deploy to dev (auto on main branch)
#    4. DeployStaging — deploy to staging (manual approval gate)
#    5. DeployProd    — deploy to prod    (manual approval gate)
#
#  Required variable group "smartnest-common" (Pipelines → Library):
#    AZURE_SUBSCRIPTION_ID   — Azure subscription GUID
#    AZURE_TENANT_ID         — Entra ID tenant GUID           (mark secret)
#    API_APP_CLIENT_ID       — App Registration client ID     (mark secret)
#    APIM_PUBLISHER_EMAIL    — APIM publisher e-mail          (mark secret)
#    MONITOR_ALERT_EMAIL     — Alert notification e-mail      (mark secret)
#
#  Service connection:
#    "smartnest-azure-sc" — Azure Resource Manager service connection
#    (Contributor on subscription or on the three resource groups)
#
#  Fix C2: secrets are written to a temp JSON file and passed as
#           @/tmp/param-overrides.json — never echoed as CLI args.
#  Fix M2: WhatIf stage now creates the dev RG before running what-if.
#  Fix M4: Validate stage has a preflight step that fails fast if
#           required variables are missing or still hold placeholder values.
#  Fix L3: SmartNestPlan feature branch removed from trigger — only
#           main triggers the full pipeline; PRs trigger validate only.
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - services/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - services/**

variables:
  - group: smartnest-common        # shared secrets / config (see header)
  - name: templateFile
    value: infra/main.bicep
  - name: azureServiceConnection
    value: smartnest-azure-sc
  - name: devResourceGroup
    value: smartnest-rg-dev
  - name: stagingResourceGroup
    value: smartnest-rg-staging
  - name: prodResourceGroup
    value: smartnest-rg-prod
  - name: location
    value: eastus
  - name: homeServiceSolution
    value: services/SmartNest.sln
  - name: homeServiceProject
    value: services/home-service/SmartNest.HomeService/SmartNest.HomeService.csproj

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Validate (runs on every push / PR)
# ─────────────────────────────────────────────────────────────
stages:
  - stage: Validate
    displayName: '🔍 Validate Bicep'
    jobs:
      - job: ValidateBicep
        displayName: 'Preflight + Bicep lint + ARM validate'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          # Fix M4 — fail fast if required secrets are not configured
          - script: |
              ERRORS=0
              if [ -z "$(AZURE_TENANT_ID)" ] || [ "$(AZURE_TENANT_ID)" = "YOUR_TENANT_ID" ]; then
                echo "##vso[task.logissue type=error]AZURE_TENANT_ID is missing or still holds the placeholder value. Populate it in the 'smartnest-common' variable group."
                ERRORS=$((ERRORS+1))
              fi
              if [ -z "$(API_APP_CLIENT_ID)" ] || [ "$(API_APP_CLIENT_ID)" = "YOUR_API_APP_CLIENT_ID" ]; then
                echo "##vso[task.logissue type=error]API_APP_CLIENT_ID is missing or still holds the placeholder value. Run infra/setup-entra.sh first."
                ERRORS=$((ERRORS+1))
              fi
              if [ -z "$(APIM_PUBLISHER_EMAIL)" ]; then
                echo "##vso[task.logissue type=error]APIM_PUBLISHER_EMAIL is not set in the 'smartnest-common' variable group."
                ERRORS=$((ERRORS+1))
              fi
              if [ -z "$(MONITOR_ALERT_EMAIL)" ]; then
                echo "##vso[task.logissue type=error]MONITOR_ALERT_EMAIL is not set in the 'smartnest-common' variable group."
                ERRORS=$((ERRORS+1))
              fi
              if [ "$ERRORS" -gt 0 ]; then exit 1; fi
              echo "Preflight passed — all required variables are set."
            displayName: 'Preflight — validate required variables'

          - task: AzureCLI@2
            displayName: 'Install Bicep CLI'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az bicep install

          - task: AzureCLI@2
            displayName: 'Bicep build (lint)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az bicep build --file $(templateFile)

          - task: AzureCLI@2
            displayName: 'Ensure dev resource group'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az group create \
                  --name $(devResourceGroup) \
                  --location $(location) \
                  --tags project=smartnest environment=dev managedBy=bicep \
                  --output table

          # Fix C2 — write secrets to a temp file; never pass as inline CLI args
          - task: AzureCLI@2
            displayName: 'ARM validate — dev'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cat > /tmp/param-overrides.json << EOF
                {
                  "tenantId":                 { "value": "$(AZURE_TENANT_ID)" },
                  "apiAppClientId":           { "value": "$(API_APP_CLIENT_ID)" },
                  "apimPublisherEmail":        { "value": "$(APIM_PUBLISHER_EMAIL)" },
                  "monitorAlertEmailAddress": { "value": "$(MONITOR_ALERT_EMAIL)" }
                }
                EOF

                az deployment group validate \
                  --resource-group $(devResourceGroup) \
                  --template-file $(templateFile) \
                  --parameters @infra/parameters/dev.parameters.json \
                  --parameters @/tmp/param-overrides.json \
                  --output table

                rm -f /tmp/param-overrides.json

# ─────────────────────────────────────────────────────────────
# STAGE 1b — Build & Test Home Service (runs in parallel with
# Validate on every push / PR; independent of the infra stages)
# ─────────────────────────────────────────────────────────────
  - stage: BuildAndTestHomeService
    displayName: '🧪 Build & Test — Home Service'
    jobs:
      - job: BuildAndTest
        displayName: 'dotnet build + test + publish'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Use .NET 8 SDK'
            inputs:
              packageType: sdk
              version: '8.0.x'

          - script: dotnet restore $(homeServiceSolution)
            displayName: 'dotnet restore'

          - script: dotnet build $(homeServiceSolution) --configuration Release --no-restore
            displayName: 'dotnet build'

          - script: |
              dotnet test $(homeServiceSolution) \
                --configuration Release --no-build \
                --logger trx --results-directory $(Agent.TempDirectory)/testresults
            displayName: 'dotnet test'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/*.trx'
              searchFolder: '$(Agent.TempDirectory)/testresults'

          - script: |
              dotnet publish $(homeServiceProject) \
                --configuration Release --no-build \
                --output $(Build.ArtifactStagingDirectory)/home-service
            displayName: 'dotnet publish Home Service'

          - task: ArchiveFiles@2
            displayName: 'Archive Home Service publish output'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/home-service'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/home-service.zip'
              replaceExistingArchive: true

          - publish: $(Build.ArtifactStagingDirectory)/home-service.zip
            artifact: home-service-package
            displayName: 'Publish Home Service package artifact'

# ─────────────────────────────────────────────────────────────
# STAGE 2 — What-If (runs on every push / PR, informational)
# ─────────────────────────────────────────────────────────────
  - stage: WhatIf
    displayName: '📋 What-If Preview (dev)'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: WhatIfDev
        displayName: 'What-if against dev'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          # Fix M2 — ensure the RG exists before what-if (may be first run)
          - task: AzureCLI@2
            displayName: 'Ensure dev resource group'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az group create \
                  --name $(devResourceGroup) \
                  --location $(location) \
                  --tags project=smartnest environment=dev managedBy=bicep \
                  --output table

          # Fix C2 — secrets via temp file
          - task: AzureCLI@2
            displayName: 'What-if — dev'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cat > /tmp/param-overrides.json << EOF
                {
                  "tenantId":                 { "value": "$(AZURE_TENANT_ID)" },
                  "apiAppClientId":           { "value": "$(API_APP_CLIENT_ID)" },
                  "apimPublisherEmail":        { "value": "$(APIM_PUBLISHER_EMAIL)" },
                  "monitorAlertEmailAddress": { "value": "$(MONITOR_ALERT_EMAIL)" }
                }
                EOF

                az deployment group what-if \
                  --resource-group $(devResourceGroup) \
                  --template-file $(templateFile) \
                  --parameters @infra/parameters/dev.parameters.json \
                  --parameters @/tmp/param-overrides.json

                rm -f /tmp/param-overrides.json

# ─────────────────────────────────────────────────────────────
# STAGE 3 — Deploy Dev  (main branch only, auto)
# ─────────────────────────────────────────────────────────────
  - stage: DeployDev
    displayName: '🚀 Deploy — Dev'
    dependsOn:
      - WhatIf
      - BuildAndTestHomeService
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployDevInfra
        displayName: 'Deploy Bicep to dev'
        pool:
          vmImage: ubuntu-latest
        environment: smartnest-dev     # create in Azure DevOps Environments for audit trail
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Fix C2 — secrets via temp file
                - task: AzureCLI@2
                  displayName: 'Deploy — dev'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az group create \
                        --name $(devResourceGroup) \
                        --location $(location) \
                        --tags project=smartnest environment=dev managedBy=bicep \
                        --output table

                      cat > /tmp/param-overrides.json << EOF
                      {
                        "tenantId":                 { "value": "$(AZURE_TENANT_ID)" },
                        "apiAppClientId":           { "value": "$(API_APP_CLIENT_ID)" },
                        "apimPublisherEmail":        { "value": "$(APIM_PUBLISHER_EMAIL)" },
                        "monitorAlertEmailAddress": { "value": "$(MONITOR_ALERT_EMAIL)" }
                      }
                      EOF

                      az deployment group create \
                        --resource-group $(devResourceGroup) \
                        --template-file $(templateFile) \
                        --parameters @infra/parameters/dev.parameters.json \
                        --parameters @/tmp/param-overrides.json \
                        --name "smartnest-dev-$(Build.BuildId)" \
                        --output table

                      rm -f /tmp/param-overrides.json

                - download: current
                  artifact: home-service-package
                  displayName: 'Download Home Service package'

                - task: AzureFunctionApp@2
                  displayName: 'Deploy Home Service Function App — dev'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: functionAppLinux
                    appName: 'smartnest-home-svc-dev'
                    package: '$(Pipeline.Workspace)/home-service-package/home-service.zip'

# ─────────────────────────────────────────────────────────────
# STAGE 4 — Deploy Staging  (manual approval gate)
# ─────────────────────────────────────────────────────────────
  - stage: DeployStaging
    displayName: '🚀 Deploy — Staging'
    dependsOn: DeployDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployStagingInfra
        displayName: 'Deploy Bicep to staging'
        pool:
          vmImage: ubuntu-latest
        environment: smartnest-staging  # add an Approvals check in Azure DevOps Environments UI
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Fix C2 — secrets via temp file
                - task: AzureCLI@2
                  displayName: 'Deploy — staging'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az group create \
                        --name $(stagingResourceGroup) \
                        --location $(location) \
                        --tags project=smartnest environment=staging managedBy=bicep \
                        --output table

                      cat > /tmp/param-overrides.json << EOF
                      {
                        "tenantId":                 { "value": "$(AZURE_TENANT_ID)" },
                        "apiAppClientId":           { "value": "$(API_APP_CLIENT_ID)" },
                        "apimPublisherEmail":        { "value": "$(APIM_PUBLISHER_EMAIL)" },
                        "monitorAlertEmailAddress": { "value": "$(MONITOR_ALERT_EMAIL)" }
                      }
                      EOF

                      az deployment group create \
                        --resource-group $(stagingResourceGroup) \
                        --template-file $(templateFile) \
                        --parameters @infra/parameters/staging.parameters.json \
                        --parameters @/tmp/param-overrides.json \
                        --name "smartnest-staging-$(Build.BuildId)" \
                        --output table

                      rm -f /tmp/param-overrides.json

                - download: current
                  artifact: home-service-package
                  displayName: 'Download Home Service package'

                - task: AzureFunctionApp@2
                  displayName: 'Deploy Home Service Function App — staging'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: functionAppLinux
                    appName: 'smartnest-home-svc-staging'
                    package: '$(Pipeline.Workspace)/home-service-package/home-service.zip'

# ─────────────────────────────────────────────────────────────
# STAGE 5 — Deploy Prod  (manual approval gate)
# ─────────────────────────────────────────────────────────────
  - stage: DeployProd
    displayName: '🚀 Deploy — Prod'
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdInfra
        displayName: 'Deploy Bicep to prod'
        pool:
          vmImage: ubuntu-latest
        environment: smartnest-prod    # add an Approvals check in Azure DevOps Environments UI
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Fix C2 — secrets via temp file
                - task: AzureCLI@2
                  displayName: 'Deploy — prod'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az group create \
                        --name $(prodResourceGroup) \
                        --location $(location) \
                        --tags project=smartnest environment=prod managedBy=bicep \
                        --output table

                      cat > /tmp/param-overrides.json << EOF
                      {
                        "tenantId":                 { "value": "$(AZURE_TENANT_ID)" },
                        "apiAppClientId":           { "value": "$(API_APP_CLIENT_ID)" },
                        "apimPublisherEmail":        { "value": "$(APIM_PUBLISHER_EMAIL)" },
                        "monitorAlertEmailAddress": { "value": "$(MONITOR_ALERT_EMAIL)" }
                      }
                      EOF

                      az deployment group create \
                        --resource-group $(prodResourceGroup) \
                        --template-file $(templateFile) \
                        --parameters @infra/parameters/prod.parameters.json \
                        --parameters @/tmp/param-overrides.json \
                        --name "smartnest-prod-$(Build.BuildId)" \
                        --output table

                      rm -f /tmp/param-overrides.json

                - download: current
                  artifact: home-service-package
                  displayName: 'Download Home Service package'

                - task: AzureFunctionApp@2
                  displayName: 'Deploy Home Service Function App — prod'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: functionAppLinux
                    appName: 'smartnest-home-svc-prod'
                    package: '$(Pipeline.Workspace)/home-service-package/home-service.zip'
